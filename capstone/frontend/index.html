<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hostel Management System Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #111827; /* gray-900 */
      }
      .bg-gradient-custom {
        background-image: linear-gradient(135deg, #1f2937, #111827);
      }
      .form-container {
        transform: scale(1);
        transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
        opacity: 1;
      }
      .form-container.fade-out {
        transform: scale(0.95);
        opacity: 0;
        display: none;
      }
    </style>
  </head>
  <body
    class="flex items-center justify-center min-h-screen p-4 bg-gray-900 text-gray-300"
  >
    <div
      id="main-container"
      class="bg-gray-800 bg-gradient-custom rounded-2xl shadow-2xl p-8 w-full max-w-sm transition-all duration-300 ease-in-out transform scale-100"
    >
      <div id="role-selection" class="form-container">
        <h2 class="text-3xl font-bold text-center text-white mb-6">
          Welcome to HMS
        </h2>
        <p class="text-center text-gray-400 mb-8">
          Please select your mode to log in.
        </p>
        <div class="space-y-4">
          <button
            id="student-mode-btn"
            class="w-full flex justify-center py-4 px-4 rounded-lg shadow-md text-base font-semibold text-white bg-blue-600 hover:bg-blue-700 transition-colors duration-200"
          >
            <i class="fa-solid fa-graduation-cap mr-2"></i>
            Student Mode
          </button>
          <button
            id="doctor-mode-btn"
            class="w-full flex justify-center py-4 px-4 rounded-lg shadow-md text-base font-semibold text-white bg-green-600 hover:bg-green-700 transition-colors duration-200"
          >
            <i class="fa-solid fa-user-md mr-2"></i>
            Doctor Mode
          </button>
        </div>
      </div>

      <!-- Student Login/Register Forms (Initially Hidden) -->
      <div
        id="student-auth-container"
        class="form-container fade-out"
        style="display: none"
      >
        <div
          id="student-login-form-container"
          class="transition-opacity duration-300 ease-in-out"
        >
          <h2 class="text-3xl font-bold text-center text-white mb-6">
            Student Sign In
          </h2>
          <form id="student-login-form" class="space-y-6">
            <div>
              <label
                for="student-login-regno"
                class="block text-sm font-medium text-gray-400"
                >Registration Number</label
              >
              <input
                type="text"
                id="student-login-regno"
                class="mt-1 block w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200"
                required
              />
            </div>
            <div>
              <label
                for="student-login-password"
                class="block text-sm font-medium text-gray-400"
                >Password</label
              >
              <input
                type="password"
                id="student-login-password"
                class="mt-1 block w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200"
                required
              />
            </div>
            <button
              type="submit"
              class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200"
            >
              Sign In
            </button>
          </form>
          <p class="mt-6 text-center text-sm text-gray-400">
            Don't have an account?
            <a
              href="#"
              id="show-student-register"
              class="font-medium text-blue-400 hover:text-blue-300 transition-colors duration-200"
              >Sign Up</a
            >
          </p>
          <button
            id="back-to-role-student"
            class="mt-4 w-full text-center text-sm text-gray-400 hover:text-white transition-colors duration-200"
          >
            ← Back
          </button>
        </div>
        <div
          id="student-register-form-container"
          class="transition-opacity duration-300 ease-in-out"
          style="display: none"
        >
          <h2 class="text-3xl font-bold text-center text-white mb-6">
            Student Sign Up
          </h2>
          <form id="student-register-form" class="space-y-6">
            <div>
              <label
                for="student-register-name"
                class="block text-sm font-medium text-gray-400"
                >Full Name</label
              >
              <input
                type="text"
                id="student-register-name"
                class="mt-1 block w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200"
                required
              />
            </div>
            <div>
              <label
                for="student-register-regno"
                class="block text-sm font-medium text-gray-400"
                >Registration Number</label
              >
              <input
                type="text"
                id="student-register-regno"
                class="mt-1 block w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200"
                required
              />
            </div>
            <div>
              <label
                for="student-register-password"
                class="block text-sm font-medium text-gray-400"
                >Password</label
              >
              <input
                type="password"
                id="student-register-password"
                class="mt-1 block w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200"
                required
              />
            </div>
            <button
              type="submit"
              class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200"
            >
              Sign Up
            </button>
          </form>
          <p class="mt-6 text-center text-sm text-gray-400">
            Already have an account?
            <a
              href="#"
              id="show-student-login"
              class="font-medium text-blue-400 hover:text-blue-300 transition-colors duration-200"
              >Sign In</a
            >
          </p>
          <button
            id="back-to-role-student-register"
            class="mt-4 w-full text-center text-sm text-gray-400 hover:text-white transition-colors duration-200"
          >
            ← Back
          </button>
        </div>
      </div>

      <!-- Doctor Login Form (Initially Hidden) -->
      <div
        id="doctor-auth-container"
        class="form-container fade-out"
        style="display: none"
      >
        <h2 class="text-3xl font-bold text-center text-white mb-6">
          Doctor Sign In
        </h2>
        <form id="doctor-login-form" class="space-y-6">
          <div>
            <label
              for="doctor-id"
              class="block text-sm font-medium text-gray-400"
              >Doctor ID</label
            >
            <input
              type="text"
              id="doctor-id"
              class="mt-1 block w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
              required
            />
          </div>
          <div>
            <label
              for="doctor-password"
              class="block text-sm font-medium text-gray-400"
              >Password</label
            >
            <input
              type="password"
              id="doctor-password"
              class="mt-1 block w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
              required
            />
          </div>
          <button
            type="submit"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-colors duration-200"
          >
            Sign In
          </button>
        </form>
        <button
          id="back-to-role-doctor"
          class="mt-6 w-full text-center text-sm text-gray-400 hover:text-white transition-colors duration-200"
        >
          ← Back
        </button>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script>
      const roleSelection = document.getElementById("role-selection");
      const studentAuthContainer = document.getElementById(
        "student-auth-container"
      );
      const doctorAuthContainer = document.getElementById(
        "doctor-auth-container"
      );

      const studentLoginContainer = document.getElementById(
        "student-login-form-container"
      );
      const studentRegisterContainer = document.getElementById(
        "student-register-form-container"
      );
      const showStudentRegisterLink = document.getElementById(
        "show-student-register"
      );
      const showStudentLoginLink =
        document.getElementById("show-student-login");

      const studentModeBtn = document.getElementById("student-mode-btn");
      const doctorModeBtn = document.getElementById("doctor-mode-btn");

      const backToRoleStudentBtn = document.getElementById(
        "back-to-role-student"
      );
      const backToRoleStudentRegisterBtn = document.getElementById(
        "back-to-role-student-register"
      );
      const backToRoleDoctorBtn = document.getElementById(
        "back-to-role-doctor"
      );

      // Initially hide all forms except role selection
      studentAuthContainer.style.display = "none";
      doctorAuthContainer.style.display = "none";
      studentRegisterContainer.style.display = "none";
      studentLoginContainer.style.display = "block";

      function transitionTo(targetContainer) {
        const currentContainers = [
          roleSelection,
          studentAuthContainer,
          doctorAuthContainer,
        ];
        currentContainers.forEach((container) => {
          if (container === targetContainer) {
            container.classList.remove("fade-out");
            container.style.display = "block";
          } else {
            container.classList.add("fade-out");
            setTimeout(() => (container.style.display = "none"), 500); // Wait for transition
          }
        });
      }

      // Event listeners for role selection
      studentModeBtn.addEventListener("click", () => {
        transitionTo(studentAuthContainer);
      });

      doctorModeBtn.addEventListener("click", () => {
        transitionTo(doctorAuthContainer);
      });

      // Event listeners for back buttons
      backToRoleStudentBtn.addEventListener("click", (e) => {
        e.preventDefault();
        transitionTo(roleSelection);
      });

      backToRoleStudentRegisterBtn.addEventListener("click", (e) => {
        e.preventDefault();
        transitionTo(roleSelection);
      });

      backToRoleDoctorBtn.addEventListener("click", (e) => {
        e.preventDefault();
        transitionTo(roleSelection);
      });

      // Student form toggles
      showStudentRegisterLink.addEventListener("click", (e) => {
        e.preventDefault();
        studentLoginContainer.classList.add("fade-out");
        setTimeout(() => {
          studentLoginContainer.style.display = "none";
          studentRegisterContainer.classList.remove("fade-out");
          studentRegisterContainer.style.display = "block";
        }, 500);
      });

      showStudentLoginLink.addEventListener("click", (e) => {
        e.preventDefault();
        studentRegisterContainer.classList.add("fade-out");
        setTimeout(() => {
          studentRegisterContainer.style.display = "none";
          studentLoginContainer.classList.remove("fade-out");
          studentLoginContainer.style.display = "block";
        }, 500);
      });
    </script>
  </body>
</html>
